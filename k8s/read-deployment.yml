apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-reader
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reader
  template:
    metadata:
      labels:
        app: reader
    spec:
      containers:
        - name: reader-container
          image: reader:2
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
---

apiVersion: v1
kind: Service
metadata:
  name: reader-service
spec:
  type: LoadBalancer
  selector:
      app: reader
  ports:
    - port: 8082
      targetPort: 8080
